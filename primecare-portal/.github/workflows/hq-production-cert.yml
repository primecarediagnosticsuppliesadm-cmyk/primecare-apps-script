name: HQ Production Certification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  certify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: primecare-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: primecare-portal/package-lock.json
      - run: npm ci
      - name: Production monitoring probes
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "SKIP: Supabase secrets not configured — workflow documents alert hook only"
            exit 0
          fi
          printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\n' \
            "$VITE_SUPABASE_URL" "$VITE_SUPABASE_ANON_KEY" > .env.local
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY" >> .env.local
          fi
          node scripts/verify-production-monitoring.mjs
          node scripts/verify-sprint1-health.mjs
